
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab App</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    padding: 10px;
    margin: 0;
    background: #f5f5f5;
  }

  .container {
    max-width: 480px;
    margin: auto;
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  #word {
    cursor: pointer;
    font-size: 28px;
    margin: 15px 0;
  }

  #word:hover {
    color: blue;
  }

  #meaning {
    font-size: 20px;
    margin: 10px 0;
  }

  #example {
    font-size: 16px;
    color: gray;
    margin: 10px 0;
  }

  button {
    width: 100%;
    margin: 5px 0;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }

  button:active {
    transform: scale(0.97);
  }

  .btn-row {
    display: flex;
    gap: 5px;
  }

  .btn-row button {
    flex: 1;
  }

  .correct { background: #4CAF50; color: white; }
  .wrong { background: #f44336; color: white; }
  .normal { background: #2196F3; color: white; }

  .box {
    border: 1px solid #ddd;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    background: #fafafa;
  }

  .weak-word {
    cursor: pointer;
    color: blue;
    display: inline-block;
    margin: 3px;
  }

  .stats {
    display: flex;
    justify-content: space-around;
    font-size: 16px;
  }

</style>
</head>

<body>

<div class="container">

<h2 id="word" onclick="toggleMeaning()">👉 เริ่มเรียน</h2>
<p id="meaning" style="display:none;"></p>
<p id="example" style="display:none;"></p>

<div class="btn-row">
  <button class="normal" onclick="nextWord()">ถัดไป</button>
  <button class="normal" onclick="randomWord()">🎲 สุ่ม</button>
</div>

<div class="btn-row">
  <button class="correct" onclick="markCorrect()">✅ จำได้</button>
  <button class="wrong" onclick="markWrong()">❌ จำไม่ได้</button>
</div>

<hr>

<h3>📊 สถิติ</h3>
<div class="stats">
  <div>✅ <span id="correct">0</span></div>
  <div>❌ <span id="wrong">0</span></div>
  <div>🎯 <span id="accuracy">0%</span></div>
</div>

<hr>

<h3>📚 คำที่จำไม่ได้</h3>
<div id="weakList" class="box">ยังไม่มีคำที่จำไม่ได้</div>

<hr>

<button onclick="resetData()" style="background:#999;color:white;">🗑 รีเซ็ต</button>

</div>

<script>

// ===== DATA =====
let words = [
{word:"analyze",meaning:"วิเคราะห์",example:"We need to carefully analyze the data before making any important business decisions."},

{word:"approach",meaning:"แนวทาง",example:"This new approach can help us solve the problem more efficiently and save time."},

{word:"assess",meaning:"ประเมิน",example:"The manager will assess the employee's performance at the end of the year."},

{word:"assume",meaning:"สมมติ",example:"You should not assume everything is correct without checking the information properly."},

{word:"benefit",meaning:"ประโยชน์",example:"Regular exercise provides many long-term health benefits for both physical and mental well-being."},

{word:"capacity",meaning:"ความสามารถ",example:"The system is running at full capacity and cannot handle more users at this time."},

{word:"challenge",meaning:"ความท้าทาย",example:"Improving communication skills can be a big challenge for many people in the workplace."},

{word:"complex",meaning:"ซับซ้อน",example:"This problem is too complex to solve without proper planning and teamwork."},

{word:"concept",meaning:"แนวคิด",example:"The concept of this project is simple, but the execution requires careful attention."},

{word:"conduct",meaning:"ดำเนินการ",example:"The company will conduct a meeting to discuss the future development plan."},

{word:"consider",meaning:"พิจารณา",example:"You should consider all possible risks before making a final decision."},

{word:"context",meaning:"บริบท",example:"Understanding the context of the situation will help you make a better judgement."},

{word:"define",meaning:"กำหนด",example:"We need to clearly define our goals before starting the project."},

{word:"develop",meaning:"พัฒนา",example:"It is important to develop new skills in order to stay competitive in the job market."},

{word:"effective",meaning:"มีประสิทธิภาพ",example:"This method is very effective in improving the overall productivity of the team."},

{word:"environment",meaning:"สิ่งแวดล้อม",example:"We must work together to protect the environment for future generations."},

{word:"evaluate",meaning:"ประเมิน",example:"The teacher will evaluate the students' performance based on their work and participation."},

{word:"feature",meaning:"คุณสมบัติ",example:"This application includes many useful features that help users manage their tasks efficiently."},

{word:"focus",meaning:"โฟกัส",example:"You need to focus on your work if you want to complete it successfully and on time."},

{word:"function",meaning:"ฟังก์ชัน",example:"Each button in this application has a specific function that helps users perform different tasks."},

{word:"accurate",meaning:"ถูกต้องแม่นยำ",example:"It is important to provide accurate information when preparing financial reports."},

{word:"achieve",meaning:"บรรลุ",example:"The team worked hard throughout the year to achieve its sales targets."},

{word:"adapt",meaning:"ปรับตัว",example:"Employees must adapt to new technologies and changing business environments."},

{word:"advance",meaning:"ก้าวหน้า",example:"The company continues to advance its digital transformation strategy."},

{word:"alternative",meaning:"ทางเลือก",example:"We should consider an alternative solution if the current plan does not work."},

{word:"annual",meaning:"ประจำปี",example:"The annual meeting will be held next month to discuss company performance."},

{word:"appoint",meaning:"แต่งตั้ง",example:"The board decided to appoint a new manager for the regional office."},

{word:"approve",meaning:"อนุมัติ",example:"The supervisor must approve all expense claims before payment is processed."},

{word:"available",meaning:"พร้อมใช้งาน",example:"The latest version of the application is now available to all users."},

{word:"awareness",meaning:"ความตระหนักรู้",example:"The campaign aims to increase public awareness about financial planning."},

{word:"budget",meaning:"งบประมาณ",example:"Each department must manage its budget carefully throughout the year."},

{word:"collaborate",meaning:"ร่วมมือ",example:"Different departments need to collaborate effectively to complete the project."},

{word:"communication",meaning:"การสื่อสาร",example:"Good communication is essential for building strong relationships with customers."},

{word:"competition",meaning:"การแข่งขัน",example:"The company faces strong competition from other businesses in the industry."},

{word:"compliance",meaning:"การปฏิบัติตามกฎ",example:"All employees must ensure compliance with company policies and regulations."},

{word:"confidence",meaning:"ความมั่นใจ",example:"Proper preparation can help employees gain confidence before presentations."},

{word:"customer",meaning:"ลูกค้า",example:"Providing excellent service can improve customer satisfaction and loyalty."},

{word:"decision",meaning:"การตัดสินใจ",example:"The management team will make a final decision after reviewing all options."},

{word:"demand",meaning:"ความต้องการ",example:"The demand for digital banking services has increased significantly."},

{word:"efficiency",meaning:"ประสิทธิภาพ",example:"Automation helps improve operational efficiency and reduce costs."},

{word:"employee",meaning:"พนักงาน",example:"Each employee is encouraged to participate in professional development programs."},

{word:"estimate",meaning:"ประมาณการ",example:"The finance department will estimate next year's operating expenses."},

{word:"expand",meaning:"ขยาย",example:"The organization plans to expand its services to new regions."},

{word:"experience",meaning:"ประสบการณ์",example:"Previous work experience can help candidates perform better in their roles."},

{word:"finance",meaning:"การเงิน",example:"Finance professionals must understand both risks and opportunities in the market."},

{word:"forecast",meaning:"คาดการณ์",example:"Analysts use historical data to forecast future business performance."},

{word:"goal",meaning:"เป้าหมาย",example:"Setting clear goals helps employees stay motivated and focused."},

{word:"guideline",meaning:"แนวทางปฏิบัติ",example:"Please follow the guidelines provided in the company handbook."},

{word:"immediate",meaning:"ทันที",example:"The issue requires immediate attention to prevent further problems."},

{word:"investment",meaning:"การลงทุน",example:"The bank offers several investment options for long-term financial growth."},

{word:"leadership",meaning:"ภาวะผู้นำ",example:"Strong leadership plays a key role in organizational success."},

{word:"management",meaning:"การบริหารจัดการ",example:"Effective management ensures that resources are used efficiently."},

{word:"objective",meaning:"วัตถุประสงค์",example:"The main objective of the project is to improve customer service quality."},

{word:"opportunity",meaning:"โอกาส",example:"This training program provides employees with opportunities for career growth."},

{word:"organization",meaning:"องค์กร",example:"The organization encourages innovation and continuous improvement."},

{word:"outcome",meaning:"ผลลัพธ์",example:"The outcome of the project exceeded everyone's expectations."},

{word:"participate",meaning:"เข้าร่วม",example:"Employees are encouraged to participate in workshops and training sessions."},

{word:"performance",meaning:"ผลการดำเนินงาน",example:"The company's performance improved significantly during the last quarter."},

{word:"priority",meaning:"ลำดับความสำคัญ",example:"Customer satisfaction remains the organization's highest priority."},

{word:"productivity",meaning:"ประสิทธิผลในการทำงาน",example:"Improved technology can increase employee productivity considerably."},

{word:"project",meaning:"โครงการ",example:"The project was completed successfully within budget and on schedule."},

{word:"quality",meaning:"คุณภาพ",example:"Maintaining high quality standards is essential for customer trust."},

{word:"recommend",meaning:"แนะนำ",example:"I would recommend reviewing the report before submitting it."},

{word:"resource",meaning:"ทรัพยากร",example:"Human resources are one of the most valuable assets of any organization."},

{word:"schedule",meaning:"ตารางเวลา",example:"The project manager created a detailed schedule to track progress."},

{word:"solution",meaning:"วิธีแก้ปัญหา",example:"The team developed an innovative solution to address customer concerns."},

{word:"standard",meaning:"มาตรฐาน",example:"All products must meet industry standards before being released."},

{word:"training",meaning:"การฝึกอบรม",example:"Regular training helps employees improve their knowledge and skills."},

{word:"update",meaning:"ปรับปรุงข้อมูล",example:"Please update the system regularly to ensure security and reliability."},

{word:"workflow",meaning:"กระบวนการทำงาน",example:"The new workflow reduced delays and improved overall productivity."}

];

let weakWords=[],correct=0,wrong=0,index=0,isShown=false;

// ===== render =====
function render(){
 if(index>=words.length) index=0;
 let c=words[index];

 word.innerText="👉 "+c.word;
 meaning.innerText=c.meaning;
 example.innerText=c.example;

 isShown=false;
 meaning.style.display="none";
 example.style.display="none";

 updateStats();
 updateWeak();
}

// ===== toggle =====
function toggleMeaning(){
 isShown=!isShown;
 meaning.style.display=isShown?"block":"none";
 example.style.display=isShown?"block":"none";
}

// ===== control =====
function nextWord(){ index++; render(); }
function randomWord(){
 index=Math.floor(Math.random()*words.length);
 render();
}

// ===== learning =====
function markWrong(){
 let c=words[index];
 if(!weakWords.some(w=>w.word===c.word)){
   weakWords.push(c);
 }
 wrong++;
 render();
}


function markCorrect(){
  let c = words[index];

  // 🔥 ลบแบบ loop (เสถียรกว่า filter)
  for (let i = 0; i < weakWords.length; i++) {
    if (weakWords[i].word === c.word) {
      weakWords.splice(i, 1);
      break;
    }
  }

  correct++;

  render(); // ✅ อัปเดตทันที
}

// ===== weak list =====
function updateWeak(){
 if(weakWords.length===0){
   weakList.innerText="ยังไม่มีคำที่จำไม่ได้";
   return;
 }
 weakList.innerHTML=weakWords.map((w,i)=>
   `<span class="weak-word" onclick="showWeak(${i})">${w.word}</span>`
 ).join(", ");
}

function showWeak(i){
 let w=weakWords[i];
 word.innerText="👉 "+w.word;
 meaning.innerText=w.meaning;
 example.innerText=w.example;
 meaning.style.display="block";
 example.style.display="block";
}

// ===== stats =====
function updateStats(){
 document.getElementById("correct").innerText=correct;
 document.getElementById("wrong").innerText=wrong;

 let total=correct+wrong;
 document.getElementById("accuracy").innerText=
   (total?Math.round(correct/total*100):0)+"%";
}

// ===== reset =====
function resetData(){
 location.reload();
}

// start
render();
</script>

</body>
</html>
